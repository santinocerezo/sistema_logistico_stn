services:
  # ─── Backend (Node.js / Express) ─────────────────────────────────────────────
  - type: web
    name: stn-logistics-api
    runtime: node
    rootDir: packages/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        fromService:
          name: stn-logistics-web
          type: web
          property: host
          transform: https://{host}
      - key: DATABASE_URL
        fromDatabase:
          name: stn-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false   # set manually in Render dashboard (optional — app degrades gracefully without Redis)
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ENCRYPTION_MASTER_KEY
        generateValue: true
      # Optional — leave blank if not using
      - key: OPENAI_API_KEY
        value: ""
      - key: SENDGRID_API_KEY
        value: ""

  # ─── Frontend (React / Vite — Static Site) ────────────────────────────────────
  - type: web
    name: stn-logistics-web
    runtime: static
    rootDir: packages/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: stn-logistics-api
          type: web
          property: host
          transform: https://{host}
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ─── PostgreSQL (free tier — 1 GB, 97-day limit) ──────────────────────────────
  - name: stn-postgres
    databaseName: stnpq
    user: stnpq_user
    plan: free
